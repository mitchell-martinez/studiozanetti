# docker-compose.staging.yml
# ─────────────────────────────────────────────────────────────────────────────
# Staging deployment on the same Mammoth Cloud VPS.
# Runs on port 3001 so staging and production coexist on one server.
# Caddy routes staging.studiozanetti.mitchellmartinez.tech → port 3001.
#
# First-time setup and routine operations: see README § Deploy to Mammoth Cloud
# ─────────────────────────────────────────────────────────────────────────────

services:
  web:
    image: ghcr.io/mitchell-martinez/studiozanetti:staging
    container_name: studiozanetti-staging
    restart: unless-stopped
    ports:
      - '127.0.0.1:3001:3000' # loopback only — Caddy is the public entry point
    env_file:
      - .env.staging # created/updated automatically by the deploy workflow
    environment:
      - NODE_ENV=production
      - PORT=3000
