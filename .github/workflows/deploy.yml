# .github/workflows/deploy.yml
# ─────────────────────────────────────────────────────────────────────────────
# CI / CD pipeline for Studio Zanetti
#
# Branching strategy
# ──────────────────
#   staging    → auto-deploys to STAGING  (https://staging.studiozanetti.mitchellmartinez.tech)
#   main       → auto-deploys to PRODUCTION (https://studiozanetti.mitchellmartinez.tech)
#
# To promote staging to production:
#   git push origin staging:main   (or merge staging → main via PR)
#
# Pipeline stages
# ───────────────
#   1. ci           — lint, typecheck, unit tests (runs on every push + every PR)
#   2. build        — build Docker image → push to ghcr.io (push events only)
#   3. deploy-staging   — pull image on VPS, restart staging container  (staging only)
#   4. deploy-production — pull image on VPS, restart production container (main only)
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions)
# ─────────────────────────────────────────────────────────────────────
#   VPS_HOST             IP address or hostname of the Mammoth Cloud VPS
#   VPS_USER             SSH username (e.g. root or a dedicated deploy user)
#   VPS_SSH_KEY          Private SSH key (ED25519 recommended) — matching public key
#                        must be in ~/.ssh/authorized_keys on the VPS
#   GHCR_TOKEN           GitHub Personal Access Token with read:packages scope
#                        Used by the VPS to pull Docker images from ghcr.io
#   WORDPRESS_URL_STAGING  Full URL of the staging WordPress instance (no trailing slash)
#                          If not set, the site falls back to hardcoded content
#   WORDPRESS_URL_PROD     Full URL of the production WordPress instance
# ─────────────────────────────────────────────────────────────────────────────

name: CI & Deploy

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

jobs:
  # ─── Stage 1: lint, typecheck, unit tests ────────────────────────────────
  ci:
    name: CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

  # ─── Stage 2: build Docker image and push to ghcr.io ─────────────────────
  build:
    name: Build image
    needs: ci
    # Only build on push events, not pull requests
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Determine the image tag from the branch name:
      #   refs/heads/main       → ghcr.io/.../studiozanetti:main
      #   refs/heads/production → ghcr.io/.../studiozanetti:production
      - name: Resolve image tag
        id: tag
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "value=ghcr.io/${{ github.repository }}:${BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tag.outputs.value }}
          # GitHub Actions cache → dramatically faster rebuilds
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Stage 3: deploy to staging ──────────────────────────────────────────
  deploy-staging:
    name: Deploy → staging
    needs: build
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: staging
      url: https://staging.studiozanetti.mitchellmartinez.tech

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      # Write the env file locally so the secret value never appears in SSH logs
      - name: Prepare env file
        env:
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL_STAGING }}
        run: |
          printf 'WORDPRESS_URL=%s\nWORDPRESS_CACHE_TTL_SECONDS=60\n' \
            "${WORDPRESS_URL}" > /tmp/.env.staging

      - name: Copy compose file + env to VPS
        run: |
          scp -i ~/.ssh/deploy_key \
            docker-compose.staging.yml \
            /tmp/.env.staging \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/zanetti/"

      - name: Pull image and restart staging container
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.repository_owner }}
        run: |
          ssh -i ~/.ssh/deploy_key \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "GHCR_TOKEN='${GHCR_TOKEN}' GHCR_USER='${GHCR_USER}' bash -s" << 'ENDSSH'
              echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin
              cd /opt/zanetti
              docker compose -f docker-compose.staging.yml pull
              docker compose -f docker-compose.staging.yml up -d --remove-orphans
              docker image prune -f
              docker logout ghcr.io
          ENDSSH

  # ─── Stage 4: deploy to production ───────────────────────────────────────
  deploy-production:
    name: Deploy → production
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: production
      url: https://studiozanetti.mitchellmartinez.tech

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Prepare env file
        env:
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL_PROD }}
        run: |
          printf 'WORDPRESS_URL=%s\nWORDPRESS_CACHE_TTL_SECONDS=60\n' \
            "${WORDPRESS_URL}" > /tmp/.env.prod

      - name: Copy compose file + env to VPS
        run: |
          scp -i ~/.ssh/deploy_key \
            docker-compose.prod.yml \
            /tmp/.env.prod \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/zanetti/"

      - name: Pull image and restart production container
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.repository_owner }}
        run: |
          ssh -i ~/.ssh/deploy_key \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "GHCR_TOKEN='${GHCR_TOKEN}' GHCR_USER='${GHCR_USER}' bash -s" << 'ENDSSH'
              echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin
              cd /opt/zanetti
              docker compose -f docker-compose.prod.yml pull
              docker compose -f docker-compose.prod.yml up -d --remove-orphans
              docker image prune -f
              docker logout ghcr.io
          ENDSSH
