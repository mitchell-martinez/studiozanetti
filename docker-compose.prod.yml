# docker-compose.prod.yml
# ─────────────────────────────────────────────────────────────────────────────
# Production deployment on Mammoth Cloud VPS.
# Caddy reverse-proxies studiozanetti.mitchellmartinez.tech → port 3000.
#
# First-time setup and routine operations: see README § Deploy to Mammoth Cloud
# ─────────────────────────────────────────────────────────────────────────────

services:
  web:
    image: ghcr.io/mitchell-martinez/studiozanetti:production
    container_name: zanetti-prod
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"   # loopback only — Caddy is the public entry point
    env_file:
      - .env.prod                # created/updated automatically by the deploy workflow
    environment:
      - NODE_ENV=production
      - PORT=3000
